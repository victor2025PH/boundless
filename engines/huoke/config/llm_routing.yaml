# -*- coding: utf-8 -*-
# LLM Router 路由配置 —— 主控集中式 ollama + 云端 fallback
#
# 设计:
#   - primary: 主控部署 ollama (192.168.0.118:11434)，各 worker 通过 HTTP 调
#   - fallback: ollama 不可用时切到云端 (anthropic / openai / qwen-cloud)
#   - circuit_breaker: 连续失败 N 次切云端，每 recovery_check_interval 秒探活恢复
#   - per_task_override: 不同 task (ai_greeting / handoff_summary / persona_classify)
#       使用不同的 primary/fallback 模型；缺省回落到 primary.model / fallback.model
#
# 调用方:
#   from src.host.llm_router import llm_complete
#   llm_complete(prompt="hi", task="ai_greeting", max_tokens=128)

llm:
  primary:
    backend: ollama_central
    base_url: http://192.168.0.118:11434
    model: qwen2.5:latest        # 主控实际加载的 7b 文本模型
    timeout: 30
    health_check_interval: 60

  fallback:
    enabled: true
    backend: cloud
    provider: anthropic
    api_key_env: ANTHROPIC_API_KEY
    model: claude-haiku-4-5-20251001
    base_url: https://api.anthropic.com
    timeout: 30

  routing_policy:
    health_strategy: circuit_breaker
    failure_threshold: 3
    recovery_check_interval: 120

  per_task_override:
    # 主控 ollama 已加载: qwen2.5vl:7b / qwen2.5:latest / gemma4:latest /
    # nomic-embed-text:latest (另有一个 uncensored 模型, 仅限门禁启用, 见下方合规说明)
    ai_greeting:
      primary_model: qwen2.5:latest             # 中文/日文 fast text
      fallback_model: claude-haiku-4-5-20251001
    handoff_summary:
      primary_model: qwen2.5:latest             # 当前没装 14b, 用 7b 占位
      fallback_model: claude-sonnet-4-6
    persona_classify:
      primary_model: qwen2.5vl:7b               # vision-language (现 L2 VLM)
      fallback_model: claude-sonnet-4-6
    # ── 合规门禁 (COMPLIANCE GATE) ────────────────────────────────────
    # uncensored 模型 (gemma4-uncensored —— 仅门禁 gated-only, 默认 DISABLED):
    # 本默认配置一律路由合规模型。即使有 override 把 task 指向名称含
    # "uncensored" 的模型, llm_router 也会拒绝并回落 llm.primary.model
    # (记 warning)。仅对已尽调/隔离交付 (vetted/gated) 客户可重新启用,
    # 且必须同时满足:
    #   (a) 环境变量 HUOKE_ALLOW_UNCENSORED=1
    #   (b) 单独的 gated overlay 配置 —— 示例见 llm_routing.gated.example.yaml
    #       (该示例默认不加载, 也绝不允许提交为激活配置)
    handoff_uncensored:                          # 合规默认 (compliant default)
      primary_model: qwen2.5:latest
      fallback_model: claude-sonnet-4-6
