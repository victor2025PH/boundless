<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="AvatarHub">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101a2e"/>
      <stop offset="1" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f7aff"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- maskable-safe: keep the mark within the central 80% safe zone -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#acc)" stroke-width="14" opacity="0.28"/>
  <!-- voice waveform bars -->
  <g fill="url(#acc)">
    <rect x="168" y="226" width="22" height="60" rx="11"/>
    <rect x="206" y="196" width="22" height="120" rx="11"/>
    <rect x="244" y="156" width="24" height="200" rx="12"/>
    <rect x="284" y="196" width="22" height="120" rx="11"/>
    <rect x="322" y="226" width="22" height="60" rx="11"/>
  </g>
</svg>
